services:
  web:
    image: ghcr.io/haydenfrank/personal-website:latest
    container_name: webapp
    ports:
      - "3000:3000"
    restart: unless-stopped
  watchtower:
    image: containrrr/watchtower
    container_name: watchtower
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    command: --interval 60
    restart: unless-stopped
    networks:
      - bridge
